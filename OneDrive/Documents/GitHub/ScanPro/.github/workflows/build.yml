name: Build Portable EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish Portable EXE
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: nuget-

    - name: Restore
      run: dotnet restore ScanPro.csproj

    - name: Build
      run: dotnet build ScanPro.csproj --configuration Release --no-restore

    - name: Download Tesseract language packs
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path tessdata | Out-Null
        $langs = @("tur", "eng")
        foreach ($lang in $langs) {
          $url = "https://github.com/tesseract-ocr/tessdata/raw/main/$lang.traineddata"
          $dest = "tessdata/$lang.traineddata"
          Write-Host "Downloading $lang.traineddata..."
          Invoke-WebRequest -Uri $url -OutFile $dest -TimeoutSec 120
        }

    - name: Publish Portable EXE
      run: |
        dotnet publish ScanPro.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -p:EnableCompressionInSingleFile=true `
          --output ./publish

    - name: Copy tessdata
      shell: pwsh
      run: Copy-Item -Recurse -Force tessdata publish/tessdata

    - name: Show EXE size
      shell: pwsh
      run: |
        $f = Get-Item "publish/ScanPro.exe"
        Write-Host "ScanPro.exe = $([math]::Round($f.Length/1MB,1)) MB"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ScanPro-Portable-win-x64
        path: |
          publish/ScanPro.exe
          publish/tessdata/
        retention-days: 30

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        name: "ScanPro ${{ github.ref_name }}"
        generate_release_notes: true
        files: publish/ScanPro.exe
        body: |
          ## ScanPro ${{ github.ref_name }}
          ### Kurulum Gerektirmez
          1. `ScanPro.exe` indirin
          2. `tessdata/` klasörünü aynı dizine koyun
          3. Çift tıklayın!

          **Gereksinimler:** Windows 10/11 x64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
